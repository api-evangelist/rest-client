aid: rest-client
name: REST Client
description: >-
  REST Client is a Visual Studio Code extension developed by Huachao Mao that
  enables developers to send HTTP requests and view responses directly within
  the VS Code editor. It supports RFC 2616 HTTP request format using .http and
  .rest files, GraphQL queries, cURL commands, multiple authentication schemes
  (Basic, Digest, SSL Client Certificates, Azure AD, AWS Signature v4, AWS
  Cognito), environment and file variables, request chaining, cookie management,
  code generation to multiple languages, and response saving. The extension is
  installed via the VS Code Marketplace under the identifier humao.rest-client
  and is widely used as a lightweight alternative to dedicated API clients like
  Postman and Insomnia.
